<p-confirmDialog></p-confirmDialog>

<!-- כפתור הוספת מתנה -->
<div class="mb-3">
  <button
    pButton
    label="Add Gift"
    icon="pi pi-plus"
    class="p-button-success"
    (click)="onAddGift()">
  </button>
</div>

<!-- טבלת מתנות -->
<p-table [value]="gifts" [paginator]="true" [rows]="10" [responsiveLayout]="'scroll'">
  <ng-template pTemplate="header">
    <tr>
      <th>Name</th>
      <th>Category</th>
      <th>Donor</th>
      <th>Price</th>
      <th>Actions</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-gift>
    <tr>
      <td>{{ gift.giftName }}</td>
      <td>{{ gift.category?.name }}</td>
      <td>{{ gift.donor?.name }}</td>
      <td>{{ gift.price | currency:'ILS' }}</td>
      <td>
        <div class="p-d-flex p-ai-center">
          <button
            pButton
            icon="pi pi-pencil"
            class="p-button-sm p-button-info mr-2"
            (click)="onEditGift(gift)">
          </button>
          <button
            pButton
            icon="pi pi-trash"
            class="p-button-sm p-button-danger"
            (click)="onDeleteGift(gift.id)">
          </button>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>

<!-- דיאלוג עריכת מתנה -->
<p-dialog header="Edit Gift" [(visible)]="editDialogVisible" [modal]="true" [closable]="true" [style]="{width: '30vw'}">
  <form *ngIf="selectedGift" (ngSubmit)="onSaveEdit()">
    <div class="p-fluid">
      <div class="field">
        <label for="giftName">Name</label>
        <input id="giftName" pInputText [(ngModel)]="selectedGift.giftName" name="giftName" required />
      </div>

      <div class="field">
        <label for="price">Price</label>
        <input id="price" pInputText type="number" [(ngModel)]="selectedGift.price" name="price" required />
      </div>
    </div>

    <div class="p-dialog-footer">
      <button type="submit" pButton label="Save" class="p-button-primary"></button>
      <button type="button" pButton label="Cancel" class="p-button-secondary" (click)="editDialogVisible = false"></button>
    </div>
  </form>
</p-dialog>
